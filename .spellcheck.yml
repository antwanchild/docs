matrix:
- name: Markdown
  aspell:
    lang: en
    ignore-case: true
  dictionary:
    encoding: utf-8
  pipeline:
  - pyspelling.filters.markdown:
      {}
  - pyspelling.filters.html:
      comments: false
      ignores:
      - code
      - pre
  sources:
  - '**/*.md'
  default_encoding: utf-8

- name: Text
  aspell:
    lang: en
    ignore-case: true
  dictionary:
    encoding: utf-8
  sources:
  - '**/*.txt'
  default_encoding: utf-8