name: Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if no new pages were added'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-site.yml
    with:
      site_name: Wiki
      site_emoji: "📖"
      content_dir: wiki/docs/
      mkdocs_dir: wiki
      env_file_path: wiki/.env
      requirements_file: requirements.wiki.txt
      image_name: wiki
      dockerfile: Dockerfile.wiki
      docker_description: Personal wiki built with MkDocs Material
      tag_prefix: wiki-
      base_url: https://wiki.anthonychild.com
      force_release: ${{ inputs.force_release || false }}
    secrets:
      ENV_FILE: ${{ secrets.ENV_FILE }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
