name: Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
  workflow_dispatch:

jobs:

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v22
        continue-on-error: true
        with:
          globs: |
            wiki/**/*.md
            !node_modules

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            wiki/**/*.md

      - name: Spellcheck changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: rojopolis/spellcheck-github-actions@0.58.0
        with:
          source_files: ${{ steps.changed-files.outputs.all_changed_files }}
          output_file: spellcheck-results.txt
        continue-on-error: true

      - name: Extract misspelled words
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if [ -f spellcheck-results.txt ]; then
            awk '/^-{80,}$/ {getline; if (NF > 0) print tolower($0)}' spellcheck-results.txt | sort -u > misspelled-words.txt || true
            if [ -s misspelled-words.txt ]; then
              echo "Misspelled words found:"
              cat misspelled-words.txt
            fi
          fi

      - name: Upload spellcheck results
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: wiki-spellcheck-results
          path: |
            spellcheck-results.txt
            misspelled-words.txt
          retention-days: 7
          if-no-files-found: ignore

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [markdownlint, spellcheck]
    if: ${{ always() && !cancelled() }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          export TZ="America/Denver"
          git fetch --tags --force

          # Check if any new .md files were added
          NEW_FILES="$(git diff --name-status HEAD~1 HEAD -- 'wiki/docs/' | grep '^A' | grep '\.md$' || true)"

          if [ -n "$NEW_FILES" ]; then
            VERSION="$(date +%Y.%m.%d)"
          else
            # Reuse last version tag
            VERSION="$(git tag --list | grep -E '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}$' | sort -V | tail -1)"
            if [ -z "$VERSION" ]; then
              VERSION="$(date +%Y.%m.%d)"
            fi
          fi

          YEAR_MONTH="$(echo "$VERSION" | cut -d. -f1-2)"
          YEAR="$(echo "$VERSION" | cut -d. -f1)"

          {
            echo "version=${VERSION}"
            echo "year_month=${YEAR_MONTH}"
            echo "year=${YEAR}"
          } >> "$GITHUB_OUTPUT"          
          echo "Using version: ${VERSION}"


      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wiki
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.year_month }}
            type=raw,value=${{ steps.version.outputs.year }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.authors=Anthony Child
            org.opencontainers.image.source=https://github.com/antwanchild/docs
            org.opencontainers.image.url=https://wiki.anthonychild.com
            org.opencontainers.image.documentation=https://wiki.anthonychild.com
            org.opencontainers.image.vendor=Anthony Child
            org.opencontainers.image.title=Wiki
            org.opencontainers.image.description=Personal wiki built with MkDocs Material

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push wiki image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.wiki
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            env_file=${{ secrets.ENV_FILE }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  version:
    name: Version and Release
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new files and determine release
        id: release-check
        run: |
          export TZ="America/Denver"
          git fetch --tags --force

          # Check if any new .md files were added
          NEW_FILES=$(git diff --name-status HEAD~1 HEAD -- 'wiki/docs/' | grep '^A' | grep '\.md$' || true)

          if [ -z "$NEW_FILES" ]; then
            echo "No new files — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine tag format
          MONTH=$(date +%m)
          YEAR=$(date +%Y)
          TAG="wiki-${YEAR}.${MONTH}"

          # Check if this tag already exists
          if git tag --list | grep -q "^${TAG}$"; then
            echo "Tag ${TAG} already exists — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.release-check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TZ="America/Denver"
          TAG="${{ steps.release-check.outputs.tag }}"
          YEAR_TAG="wiki-$(date +%Y)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use quotes for tagging and pushing
          git tag "$TAG"
          git push origin "$TAG"

          # Create or force update the yearly tag
          git tag -f "$YEAR_TAG"
          git push origin "$YEAR_TAG" --force

          # THE FIX: Added quotes around the nested $(git describe ...) subshell
          NOTES="$(git log --pretty=format:"- %s" "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"..HEAD -- wiki/ 2>/dev/null || echo "- Wiki update")"

          gh release create "$TAG" \
            --title "${TAG}" \
            --notes "${NOTES}" \
            --latest

  link-check:
    name: Link Checker
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file
        run: echo "${{ secrets.ENV_FILE }}" > wiki/.env

      - name: Build MkDocs site
        run: |
          cd wiki
          mkdocs build --site-dir ../site

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --accept 200,204,206,401,403,429
            --exclude-loopback
            --exclude 'mailto:.*'
            --exclude 'github.com/antwanchild/ubuntu_Desktop'
            --exclude '^file://'
            --exclude '%7B'
            --base 'https://wiki.anthonychild.com'
            './site/**/*.html'
          fail: true
          output: link-check-results.md
          format: markdown
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter link check results
        if: failure()
        run: grep -v '\[200\]' link-check-results.md > link-check-filtered.md || true

      - name: Upload link check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: wiki-link-check-results
          path: link-check-filtered.md
          retention-days: 7

      - name: Clean up .env
        if: always()
        run: rm -f wiki/.env
