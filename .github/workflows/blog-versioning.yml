name: Blog Auto Version

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**'

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and push blog version tag
        run: |
          TODAY=$(date +%Y.%m.%d)
          PREFIX="blog-${TODAY}"

          # Count how many tags exist for today to determine next increment
          COUNT=$(git tag --list "${PREFIX}.*" | wc -l)
          N=$((COUNT + 1))
          TAG="${PREFIX}.${N}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged as ${TAG}"