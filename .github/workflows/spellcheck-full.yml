name: Spellcheck (Full)

on:
  # Runs a full spellcheck across all content on the first of every month.
  # Incremental spellchecks on changed files are handled by wiki.yml and blog.yml.
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  spellcheck-full:
    name: Spellcheck All Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run spellcheck on all content files
        uses: rojopolis/spellcheck-github-actions@0.59.0
        continue-on-error: true
        with:
          source_files: |
            wiki/**/*.md
            blog/**/*.md
          output_file: spellcheck-results.txt

      - name: Extract misspelled words from results
        run: |
          if [ -f spellcheck-results.txt ]; then
            awk '/^-{80,}$/ {getline; if (NF > 0) print tolower($0)}' spellcheck-results.txt \
              | sort -u > misspelled-words.txt || true
            if [ -s misspelled-words.txt ]; then
              echo "Misspelled words found:"
              cat misspelled-words.txt
            fi
          fi

      - name: Upload spellcheck results as artifact
        uses: actions/upload-artifact@v7
        with:
          name: spellcheck-results-full
          path: |
            spellcheck-results.txt
            misspelled-words.txt
          retention-days: 7
          if-no-files-found: ignore
