name: Dependabot

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write
env:
  TZ: America/Denver  

jobs:

  # ---------------------------------------------------------------
  # Auto-approve and merge minor and patch Dependabot PRs.
  # Comments on major updates to flag them for manual review.
  # ---------------------------------------------------------------
  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.action != 'closed'
    steps:
      - name: Fetch Dependabot PR metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve minor and patch updates
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor and patch updates
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --squash --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates requiring manual review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ This is a **major version update**. Please review the changelog and merge manually when ready."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------
  # Notify Discord when Dependabot opens a major version update PR.
  # Major updates require manual review and are never auto-merged.
  # Minor and patch updates are notified only on merge (see below).
  # ---------------------------------------------------------------
  notify-major-update:
    name: Notify Major Update
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.action == 'opened'
    steps:
      - name: Collect PR context
        id: pr_context
        uses: actions/github-script@v8
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const filenames = files.map((file) => file.filename);
            const touchesBlog = filenames.some((name) =>
              name === 'Dockerfile.blog' || name.startsWith('blog/')
            );
            const touchesWiki = filenames.some((name) =>
              name === 'Dockerfile.wiki' || name.startsWith('wiki/')
            );

            let scope = 'Shared';
            if (touchesBlog && !touchesWiki) {
              scope = 'Blog';
            } else if (touchesWiki && !touchesBlog) {
              scope = 'Wiki';
            }

            const body = context.payload.pull_request.body || '';
            const releaseNotesMatch = body.match(/\[Release notes\]\((https?:\/\/[^)\s]+)\)/i);
            const changelogMatch = body.match(/\[Changelog\]\((https?:\/\/[^)\s]+)\)/i);
            const commitsMatch = body.match(/\[Commits\]\((https?:\/\/[^)\s]+)\)/i);

            core.setOutput('scope', scope);
            core.setOutput('release_notes_url', releaseNotesMatch ? releaseNotesMatch[1] : '');
            core.setOutput('changelog_url', changelogMatch ? changelogMatch[1] : '');
            core.setOutput('commits_url', commitsMatch ? commitsMatch[1] : '');

      - name: Fetch Dependabot PR metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord of major update requiring review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SCOPE: ${{ steps.pr_context.outputs.scope }}
          REPOSITORY: ${{ github.repository }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PREVIOUS_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          RELEASE_NOTES_URL: ${{ steps.pr_context.outputs.release_notes_url }}
          CHANGELOG_URL: ${{ steps.pr_context.outputs.changelog_url }}
          COMMITS_URL: ${{ steps.pr_context.outputs.commits_url }}
        run: |
          FORMATTED_DATE="$(date +'%B %-d, %Y')"
          CHANGE_SUMMARY="${DEPENDENCY_NAMES}"

          if [[ -n "${PREVIOUS_VERSION}" && -n "${NEW_VERSION}" ]]; then
            CHANGE_SUMMARY="${CHANGE_SUMMARY} (${PREVIOUS_VERSION} -> ${NEW_VERSION})"
          fi

          REFERENCE_LINKS=()
          [[ -n "${RELEASE_NOTES_URL}" ]] && REFERENCE_LINKS+=("[Release notes](${RELEASE_NOTES_URL})")
          [[ -n "${CHANGELOG_URL}" ]] && REFERENCE_LINKS+=("[Changelog](${CHANGELOG_URL})")
          [[ -n "${COMMITS_URL}" ]] && REFERENCE_LINKS+=("[Commits](${COMMITS_URL})")

          if [[ ${#REFERENCE_LINKS[@]} -gt 0 ]]; then
            CHANGE_DETAILS="${CHANGE_SUMMARY}\\n${REFERENCE_LINKS[*]}"
          else
            CHANGE_DETAILS="${CHANGE_SUMMARY}"
          fi

          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "⚠️ Dependabot '"${PR_SCOPE}"' — Major Update Review Required",
                "color": 16744272,
                "fields": [
                  {
                    "name": "Update",
                    "value": "'"${CHANGE_DETAILS}"'",
                    "inline": false
                  },
                  {
                    "name": "Scope",
                    "value": "'"${PR_SCOPE}"'",
                    "inline": true
                  },
                  {
                    "name": "Type",
                    "value": "'"${UPDATE_TYPE#version-update:}"' / '"${DEPENDENCY_TYPE}"'",
                    "inline": true
                  },
                  {
                    "name": "PR",
                    "value": "[#'"${PR_NUMBER}"']('"${PR_URL}"')",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Dependabot '"${PR_SCOPE}"' • github.com/'"${REPOSITORY}"' • '"${FORMATTED_DATE}"'"
                }
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"

  # ---------------------------------------------------------------
  # Notify Discord when a Dependabot PR is merged into main.
  # Fires on PR close events where the PR was actually merged.
  # ---------------------------------------------------------------
  notify-merged:
    name: Notify Merged
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - name: Collect PR context
        id: pr_context
        uses: actions/github-script@v8
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const filenames = files.map((file) => file.filename);
            const touchesBlog = filenames.some((name) =>
              name === 'Dockerfile.blog' || name.startsWith('blog/')
            );
            const touchesWiki = filenames.some((name) =>
              name === 'Dockerfile.wiki' || name.startsWith('wiki/')
            );

            let scope = 'Shared';
            if (touchesBlog && !touchesWiki) {
              scope = 'Blog';
            } else if (touchesWiki && !touchesBlog) {
              scope = 'Wiki';
            }

            const body = context.payload.pull_request.body || '';
            const releaseNotesMatch = body.match(/\[Release notes\]\((https?:\/\/[^)\s]+)\)/i);
            const changelogMatch = body.match(/\[Changelog\]\((https?:\/\/[^)\s]+)\)/i);
            const commitsMatch = body.match(/\[Commits\]\((https?:\/\/[^)\s]+)\)/i);

            core.setOutput('scope', scope);
            core.setOutput('release_notes_url', releaseNotesMatch ? releaseNotesMatch[1] : '');
            core.setOutput('changelog_url', changelogMatch ? changelogMatch[1] : '');
            core.setOutput('commits_url', commitsMatch ? commitsMatch[1] : '');

      - name: Fetch Dependabot PR metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord of merged Dependabot PR
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_SCOPE: ${{ steps.pr_context.outputs.scope }}
          REPOSITORY: ${{ github.repository }}
          DEPENDENCY_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PREVIOUS_VERSION: ${{ steps.metadata.outputs.previous-version }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          DEPENDENCY_TYPE: ${{ steps.metadata.outputs.dependency-type }}
          RELEASE_NOTES_URL: ${{ steps.pr_context.outputs.release_notes_url }}
          CHANGELOG_URL: ${{ steps.pr_context.outputs.changelog_url }}
          COMMITS_URL: ${{ steps.pr_context.outputs.commits_url }}
        run: |
          FORMATTED_DATE="$(date +'%B %-d, %Y')"
          CHANGE_SUMMARY="${DEPENDENCY_NAMES}"

          if [[ -n "${PREVIOUS_VERSION}" && -n "${NEW_VERSION}" ]]; then
            CHANGE_SUMMARY="${CHANGE_SUMMARY} (${PREVIOUS_VERSION} -> ${NEW_VERSION})"
          fi

          REFERENCE_LINKS=()
          [[ -n "${RELEASE_NOTES_URL}" ]] && REFERENCE_LINKS+=("[Release notes](${RELEASE_NOTES_URL})")
          [[ -n "${CHANGELOG_URL}" ]] && REFERENCE_LINKS+=("[Changelog](${CHANGELOG_URL})")
          [[ -n "${COMMITS_URL}" ]] && REFERENCE_LINKS+=("[Commits](${COMMITS_URL})")

          if [[ ${#REFERENCE_LINKS[@]} -gt 0 ]]; then
            CHANGE_DETAILS="${CHANGE_SUMMARY}\\n${REFERENCE_LINKS[*]}"
          else
            CHANGE_DETAILS="${CHANGE_SUMMARY}"
          fi

          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Dependabot '"${PR_SCOPE}"' — PR Merged",
                "color": 3066993,
                "fields": [
                  {
                    "name": "Update",
                    "value": "'"${CHANGE_DETAILS}"'",
                    "inline": false
                  },
                  {
                    "name": "Scope",
                    "value": "'"${PR_SCOPE}"'",
                    "inline": true
                  },
                  {
                    "name": "Type",
                    "value": "'"${UPDATE_TYPE#version-update:}"' / '"${DEPENDENCY_TYPE}"'",
                    "inline": true
                  },
                  {
                    "name": "PR",
                    "value": "[#'"${PR_NUMBER}"']('"${PR_URL}"')",
                    "inline": true
                  },
                  {
                    "name": "Merged to",
                    "value": "'"${{ github.base_ref }}"'",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "Dependabot '"${PR_SCOPE}"' • github.com/'"${REPOSITORY}"' • '"${FORMATTED_DATE}"'"
                }
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"
