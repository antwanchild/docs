name: Dependabot Discord Notification

on:
  pull_request:
    types: [opened, closed]

jobs:

  # ---------------------------------------------------------------
  # Notify Discord when Dependabot opens a major version update PR.
  # Major updates require manual review and are never auto-merged.
  # Minor and patch updates are handled silently by auto-merge.
  # ---------------------------------------------------------------
  notify-major-update:
    name: Major Update Opened
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    steps:
      - name: Fetch Dependabot PR metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord of major update requiring review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "⚠️ Dependabot Major Update — Review Required",
                "color": 16744272,
                "fields": [
                  {
                    "name": "Update",
                    "value": "'"${PR_TITLE}"'",
                    "inline": false
                  },
                  {
                    "name": "PR",
                    "value": "[#'"${PR_NUMBER}"']('"${PR_URL}"')",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "antwanchild/docs • '"$(date +'%B %-d, %Y')"'"
                }
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"

  # ---------------------------------------------------------------
  # Notify Discord when a Dependabot PR is auto-merged into main.
  # Triggers on PR close events from Dependabot where the PR was merged.
  # ---------------------------------------------------------------
  notify-auto-merged:
    name: PR Auto-Merged
    runs-on: ubuntu-latest
    if: >
      github.actor == 'dependabot[bot]' &&
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - name: Notify Discord of auto-merged Dependabot PR
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Dependabot PR Auto-Merged",
                "color": 3066993,
                "fields": [
                  {
                    "name": "Update",
                    "value": "'"${PR_TITLE}"'",
                    "inline": false
                  },
                  {
                    "name": "PR",
                    "value": "[#'"${PR_NUMBER}"']('"${PR_URL}"')",
                    "inline": true
                  },
                  {
                    "name": "Merged to",
                    "value": "'"${{ github.base_ref }}"'",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "antwanchild/docs • '"$(date +'%B %-d, %Y')"'"
                }
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"
