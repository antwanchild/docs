name: Dependabot Discord Notification

on:
  pull_request:
    types: [opened]
  push:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------
  # Notify Discord when Dependabot opens a major version update PR.
  # Major updates require manual review and are never auto-merged.
  # Minor and patch updates are handled silently by auto-merge.
  # ---------------------------------------------------------------
  notify-major-update:
    name: Major Update Opened
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    steps:
      - name: Fetch Dependabot PR metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord of major update requiring review
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "⚠️ Dependabot Major Update — Review Required",
                "color": 16744272,
                "fields": [
                  {
                    "name": "Update",
                    "value": "'"${PR_TITLE}"'",
                    "inline": false
                  },
                  {
                    "name": "PR",
                    "value": "[#'"${PR_NUMBER}"']('"${PR_URL}"')",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "antwanchild/docs • '"$(date +'%B %-d, %Y')"'"
                }
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"

  # ---------------------------------------------------------------
  # Notify Discord when a Dependabot PR is auto-merged into main.
  # Checks the most recently merged Dependabot PR to get details.
  # Skips silently if the push was not from a Dependabot merge.
  # ---------------------------------------------------------------
  notify-auto-merged:
    name: PR Auto-Merged
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Find most recently merged Dependabot PR
        id: merged-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query the most recently merged Dependabot PR
          MERGED_PR=$(gh pr list --state merged --base main \
            --json author,title,number,mergedAt,url \
            --jq '[.[] | select(.author.login == "dependabot[bot]")] | sort_by(.mergedAt) | last')

          if [ -z "$MERGED_PR" ] || [ "$MERGED_PR" == "null" ]; then
            echo "No merged Dependabot PR found — skipping notification"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "title=$(echo "$MERGED_PR" | jq -r '.title')"
            echo "number=$(echo "$MERGED_PR" | jq -r '.number')"
            echo "url=$(echo "$MERGED_PR" | jq -r '.url')"
            echo "found=true"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Discord of auto-merged Dependabot PR
        if: steps.merged-pr.outputs.found == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ steps.merged-pr.outputs.title }}
          PR_NUMBER: ${{ steps.merged-pr.outputs.number }}
          PR_URL: ${{ steps.merged-pr.outputs.url }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Dependabot PR Auto-Merged",
                "color": 3066993,
                "fields": [
                  {
                    "name": "Update",
                    "value": "'"${PR_TITLE}"'",
                    "inline": false
                  },
                  {
                    "name": "PR",
                    "value": "[#'"${PR_NUMBER}"']('"${PR_URL}"')",
                    "inline": true
                  },
                  {
                    "name": "Merged to",
                    "value": "'"${{ github.ref_name }}"'",
                    "inline": true
                  }
                ],
                "footer": {
                  "text": "antwanchild/docs • '"$(date +'%B %-d, %Y')"'"
                }
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"
