name: Wiki Auto Version

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and push wiki version tag
        run: |
          TODAY=$(date +%Y.%m.%d)
          TAG="wiki-${TODAY}"

          # If a tag for today already exists, skip tagging
          if git tag --list | grep -q "^${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Tagged as ${TAG}"
          fi