name: Super Linter

on:
  push:
    branches:
      - main
    paths:
      # Only run when code files change — not on content pushes
      - '**/*.py'
      - '**/*.sh'
      - '**/*.yaml'
      - '**/*.yml'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  superlinter:
    name: Super Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Super Linter
        uses: super-linter/super-linter@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          VALIDATE_PYTHON_PYLINT: true
          VALIDATE_BASH: true
          VALIDATE_YAML: true
          # Markdown linting is handled by markdownlint in wiki.yml and blog.yml
          VALIDATE_MARKDOWN: false
          FILTER_REGEX_EXCLUDE: .*\.git.*
