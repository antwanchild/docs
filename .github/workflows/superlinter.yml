name: Super Linter

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  superlinter:
    name: Super Linter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Super Linter
        uses: super-linter/super-linter@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          # Add these to help Super-Linter identify the diff range
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          # Your existing filters
          VALIDATE_PYTHON_PYLINT: true
          VALIDATE_BASH: true
          VALIDATE_YAML: true
          FILTER_REGEX_EXCLUDE: .*\.git.*
