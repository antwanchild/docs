name: Blog

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**'
  workflow_dispatch:

jobs:

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        continue-on-error: true
        with:
          globs: |
            blog/**/*.md
            !node_modules

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            blog/**/*.md

      - name: Spellcheck changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: rojopolis/spellcheck-github-actions@0.58.0
        with:
          source_files: ${{ steps.changed-files.outputs.all_changed_files }}
          output_file: spellcheck-results.txt
        continue-on-error: true

      - name: Extract misspelled words
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if [ -f spellcheck-results.txt alls ]; then
            awk '/^-{80,}$/ {getline; if (NF > 0) print tolower($0)}' spellcheck-results.txt | sort -u > misspelled-words.txt || true
            if [ -s misspelled-words.txt ]; then
              echo "Misspelled words found:"
              cat misspelled-words.txt
            fi
          fi

      - name: Upload spellcheck results
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: blog-spellcheck-results
          path: |
            spellcheck-results.txt
            misspelled-words.txt
          retention-days: 7
          if-no-files-found: ignore

  version:
    name: Version and Release
    runs-on: ubuntu-latest
    needs: [markdownlint, spellcheck]
    if: ${{ always() && !cancelled() }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate blog version tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y.%m.%d)
          PREFIX="blog-${TODAY}"

          git fetch --tags --force
          COUNT=$(git tag --list "${PREFIX}.*" | wc -l)
          N=$((COUNT + 1))
          TAG="${PREFIX}.${N}"

          while git tag --list | grep -q "^${TAG}$"; do
            N=$((N + 1))
            TAG="${PREFIX}.${N}"
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged as ${TAG}"

          NOTES=$(git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD -- blog/ 2>/dev/null || echo "- Blog update")

          gh release create "$TAG" \
            --title "${TAG}" \
            --notes "${NOTES}" \
            --latest

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/blog
          tags: |
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push blog image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.blog
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            env_file=${{ secrets.ENV_FILE }}

  link-check:
    name: Link Checker
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file
        run: echo "${{ secrets.ENV_FILE }}" > blog/.env

      - name: Build MkDocs site
        run: |
          cd blog
          mkdocs build --site-dir ../site

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --accept 200,204,206,401,403,429
            --exclude-loopback
            --exclude 'mailto:.*'
            --exclude '^file://'
            --exclude '%7B'
            --base-url 'https://blog.anthonychild.com'
            './site/**/*.html'
          fail: true
          output: link-check-results.md
          format: markdown
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter link check results
        if: failure()
        run: grep -v '\[200\]' link-check-results.md > link-check-filtered.md || true

      - name: Upload link check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: blog-link-check-results
          path: link-check-filtered.md
          retention-days: 7

      - name: Clean up .env
        if: always()
        run: rm -f blog/.env
