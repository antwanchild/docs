name: Blog

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if no new pages were added'
        type: boolean
        default: false    

env:
  TZ: America/Denver  

jobs:

  # ---------------------------------------------------------------
  # Lint all Markdown files in the blog directory.
  # Runs as informational only — does not block the pipeline.
  # ---------------------------------------------------------------
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v22
        continue-on-error: true
        with:
          globs: |
            blog/**/*.md
            !node_modules

  # ---------------------------------------------------------------
  # Spellcheck only the Markdown files changed in this push.
  # Results are uploaded as an artifact for review.
  # Runs as informational only — does not block the pipeline.
  # ---------------------------------------------------------------
  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed Markdown files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            blog/**/*.md

      - name: Run spellcheck on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: rojopolis/spellcheck-github-actions@0.58.0
        with:
          source_files: ${{ steps.changed-files.outputs.all_changed_files }}
          output_file: spellcheck-results.txt
        continue-on-error: true

      - name: Extract misspelled words from results
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          if [ -f spellcheck-results.txt ]; then
            awk '/^-{80,}$/ {getline; if (NF > 0) print tolower($0)}' spellcheck-results.txt \
              | sort -u > misspelled-words.txt || true
            if [ -s misspelled-words.txt ]; then
              echo "Misspelled words found:"
              cat misspelled-words.txt
            fi
          fi

      - name: Upload spellcheck results as artifact
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: blog-spellcheck-results
          path: |
            spellcheck-results.txt
            misspelled-words.txt
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------
  # Build and push the blog Docker image to GHCR.
  # Determines the version tag based on whether new posts were added.
  # Scans the built image for known CVEs using Trivy.
  # Always runs even if lint or spellcheck fail.
  # ---------------------------------------------------------------
  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: [markdownlint, spellcheck]
    if: ${{ always() && !cancelled() }}
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image version tag
        id: version
        run: |
          export TZ="America/Denver"
          git fetch --tags --force

          # Use today's date if new posts were added, otherwise reuse the last version tag
          NEW_POSTS="$(git diff --name-status HEAD~1 HEAD -- 'blog/docs/posts/' | grep '^A' | grep '\.md$' || true)"

          if [ -n "$NEW_POSTS" ]; then
            IMAGE_VERSION="$(date +%Y.%m.%d)"
          else
            IMAGE_VERSION="$(git tag --list | grep -E '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}$' | sort -V | tail -1)"
            if [ -z "$IMAGE_VERSION" ]; then
              IMAGE_VERSION="$(date +%Y.%m.%d)"
            fi
          fi

          IMAGE_VERSION_YEAR_MONTH="$(echo "$IMAGE_VERSION" | cut -d. -f1-2)"
          IMAGE_VERSION_YEAR="$(echo "$IMAGE_VERSION" | cut -d. -f1)"

          {
            echo "version=${IMAGE_VERSION}"
            echo "year_month=${IMAGE_VERSION_YEAR_MONTH}"
            echo "year=${IMAGE_VERSION_YEAR}"
          } >> "$GITHUB_OUTPUT"

          echo "Image version: ${IMAGE_VERSION}"

      - name: Generate Docker image metadata and tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/blog
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.year_month }}
            type=raw,value=${{ steps.version.outputs.year }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.authors=Anthony Child
            org.opencontainers.image.source=https://github.com/antwanchild/docs
            org.opencontainers.image.url=https://blog.anthonychild.com
            org.opencontainers.image.documentation=https://blog.anthonychild.com
            org.opencontainers.image.vendor=Anthony Child
            org.opencontainers.image.title=Blog
            org.opencontainers.image.description=Personal blog built with MkDocs Material

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push blog image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.blog
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            env_file=${{ secrets.ENV_FILE }}

      - name: Scan image for CVEs with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/blog:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ---------------------------------------------------------------
  # Create a GitHub release when new posts are added.
  # Uses monthly tags (blog-YYYY.MM) and a rolling yearly tag (blog-YYYY).
  # Skips if no new posts were added or if the monthly tag already exists.
  # ---------------------------------------------------------------
  version:
    name: Version and Release
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.release-check.outputs.should_release }}
      tag: ${{ steps.release-check.outputs.tag }}
      release_notes: ${{ steps.create-release.outputs.release_notes }} 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for new posts and determine release eligibility
        id: release-check
        run: |
          export TZ="America/Denver"
          git fetch --tags --force

          RELEASE_MONTH=$(date +%m)
          RELEASE_YEAR=$(date +%Y)
          RELEASE_TAG="blog-${RELEASE_YEAR}.${RELEASE_MONTH}"

          # Allow manual trigger to force a release
          if [[ "${{ github.event.inputs.force_release }}" == "true" ]]; then
            echo "Force release triggered manually"
            if git tag --list | grep -q "^${RELEASE_TAG}$"; then
              echo "Release tag ${RELEASE_TAG} already exists — skipping release"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Only create a release if new .md files were added this push
          NEW_PAGES=$(git diff --name-status HEAD~1 HEAD -- 'blog/docs/' | grep '^A' | grep '\.md$' || true)

          if [ -z "$NEW_PAGES" ]; then
            echo "No new pages added — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if this month's release tag already exists
          if git tag --list | grep -q "^${RELEASE_TAG}$"; then
            echo "Release tag ${RELEASE_TAG} already exists — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create monthly and yearly release tags
        id: create-release
        if: steps.release-check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TZ="America/Denver"
          RELEASE_TAG="${{ steps.release-check.outputs.tag }}"
          YEARLY_TAG="blog-$(date +%Y)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create the monthly tag
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

          # Force update the yearly tag to point to the latest monthly release
          git tag -f "$YEARLY_TAG"
          git push origin "$YEARLY_TAG" --force

          # Use recent blog commit messages as release notes
          RELEASE_NOTES="$(git log --pretty=format:"- %s" HEAD~10..HEAD -- blog/)"
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="- Blog update"
          fi

          # Use heredoc syntax to safely write multiline/special char values
          {
            echo "release_notes<<EOF"
            echo "$RELEASE_NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          gh release create "$RELEASE_TAG" \
            --title "${RELEASE_TAG}" \
            --notes "${RELEASE_NOTES}" \
            --latest

  # ---------------------------------------------------------------
  # Build the MkDocs site locally and check all links for broken URLs.
  # Filters out successful responses and uploads failures as an artifact.
  # ---------------------------------------------------------------
  link-check:
    name: Link Checker
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write .env file for MkDocs macros plugin
        run: echo "${{ secrets.ENV_FILE }}" > blog/.env

      - name: Build MkDocs site
        run: |
          cd blog
          mkdocs build --site-dir ../site

      - name: Check all links in built site
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --accept 200,204,206,401,403,429
            --exclude-loopback
            --exclude 'mailto:.*'
            --exclude 'github.com/antwanchild/ubuntu_Desktop'
            --exclude 'github.com/antwanchild/discord_cleanup'
            --exclude '^file://'
            --exclude '%7B'
            --exclude 'blog.anthonychild.com/[0-9]'
            --exclude 'blog.anthonychild.com'
            --base-url 'https://blog.anthonychild.com'
            './site/**/*.html'
          fail: true
          output: link-check-results.md
          format: markdown
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter out successful links from results
        if: failure()
        run: grep -v '\[200\]' link-check-results.md > link-check-filtered.md || true

      - name: Upload failed link check results as artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: blog-link-check-results
          path: link-check-filtered.md
          retention-days: 7

      - name: Remove .env file
        if: always()
        run: rm -f blog/.env


  notify-release:
    name: Discord Release Notification
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.should_release == 'true'
    steps:
      - name: Send release notification to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
          RELEASE_NOTES: ${{ needs.version.outputs.release_notes }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.version.outputs.tag }}
        run: |
          export TZ="America/Denver"
          # shellcheck disable=SC2034
          FORMATTED_DATE="$(date +'%B %-d, %Y')"

          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✏️ Blog Release — '"${RELEASE_TAG}"'",
                "url": "'"${RELEASE_URL}"'",
                "color": 3066993,
                "fields": [
                  {
                    "name": "Changes",
                    "value": "'"${RELEASE_NOTES:-No release notes provided.}"'",
                    "inline": false
                  },
                  {
                    "name": "Release",
                    "value": "[View on GitHub]('"${RELEASE_URL}"')",
                    "inline": true
                  }
                ],
                "footer": {
                  "title": "✏️ Blog Release — '"${RELEASE_TAG}"'",
                }
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"

  
  # ---------------------------------------------------------------
  # Send a Discord embed notification with the overall build result
  # and individual job statuses for each stage of the pipeline.
  # Always runs regardless of upstream job results.
  # ---------------------------------------------------------------
  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: [markdownlint, spellcheck, docker, version, link-check]
    if: always()
    steps:
      - name: Send build result to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          export TZ="America/Denver"
          # shellcheck disable=SC2034
          FORMATTED_DATE="$(date +'%B %-d, %Y')"

          # Set overall build title and embed color
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            EMBED_TITLE="❌ Blog Build — Failed"
            EMBED_COLOR=15158332
          else
            EMBED_TITLE="✅ Blog Build — Success"
            EMBED_COLOR=3066993
          fi

          # Map a job result string to an emoji label
          job_status_label() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              skipped) echo "⚠️ Skipped" ;;
              *)       echo "❓ Unknown" ;;
            esac
          }

          LINT_STATUS=$(job_status_label "${{ needs.markdownlint.result }}")
          SPELL_STATUS=$(job_status_label "${{ needs.spellcheck.result }}")
          DOCKER_STATUS=$(job_status_label "${{ needs.docker.result }}")
          LINK_STATUS=$(job_status_label "${{ needs.link-check.result }}")

          # Count failed jobs for the embed description
          FAILED_JOB_COUNT=0
          [[ "${{ needs.markdownlint.result }}" == "failure" ]] && FAILED_JOB_COUNT=$((FAILED_JOB_COUNT+1))
          [[ "${{ needs.spellcheck.result }}"   == "failure" ]] && FAILED_JOB_COUNT=$((FAILED_JOB_COUNT+1))
          [[ "${{ needs.docker.result }}"        == "failure" ]] && FAILED_JOB_COUNT=$((FAILED_JOB_COUNT+1))
          [[ "${{ needs.link-check.result }}"   == "failure" ]] && FAILED_JOB_COUNT=$((FAILED_JOB_COUNT+1))

          if [[ $FAILED_JOB_COUNT -eq 0 ]]; then
            EMBED_DESCRIPTION="All jobs passed"
          else
            EMBED_DESCRIPTION="${FAILED_JOB_COUNT} job(s) failed"
          fi

          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "'"${EMBED_TITLE}"'",
                "description": "'"${EMBED_DESCRIPTION}"'",
                "color": '"${EMBED_COLOR}"',
                "fields": [
                  {
                    "name": "Triggered by",
                    "value": "'"${{ github.actor }}"'",
                    "inline": true
                  },
                  {
                    "name": "Branch",
                    "value": "'"${{ github.ref_name }}"'",
                    "inline": true
                  },
                  {
                    "name": "Version",
                    "value": "'"${{ needs.docker.outputs.version }}"'",
                    "inline": true
                  },
                  {
                    "name": "Markdown Lint",
                    "value": "'"${LINT_STATUS}"'",
                    "inline": true
                  },
                  {
                    "name": "Spellcheck",
                    "value": "'"${SPELL_STATUS}"'",
                    "inline": true
                  },
                  {
                    "name": "Docker Build",
                    "value": "'"${DOCKER_STATUS}"'",
                    "inline": true
                  },
                  {
                    "name": "Link Checker",
                    "value": "'"${LINK_STATUS}"'",
                    "inline": true
                  },
                  {
                    "name": "Commit",
                    "value": "['"${GITHUB_SHA::7}"']('"${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"') — '"${COMMIT_MESSAGE}"'",
                    "inline": false
                  },
                  {
                    "name": "Actions",
                    "value": "[View Run]('"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"')",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "Blog • '"${FORMATTED_DATE}"'"
                }
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"

