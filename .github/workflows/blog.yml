name: Blog

on:
  push:
    branches:
      - main
    paths:
      - 'blog/**'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if no new posts were added'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    uses: ./.github/workflows/build-site.yml
    with:
      site_name: Blog
      site_emoji: "✏️"
      content_dir: blog/docs/posts/
      mkdocs_dir: blog
      env_file_path: blog/.env
      image_name: blog
      dockerfile: Dockerfile.blog
      docker_description: Personal blog built with MkDocs Material
      tag_prefix: blog-
      base_url: https://blog.anthonychild.com
      force_release: ${{ inputs.force_release || false }}
    secrets:
      ENV_FILE: ${{ secrets.ENV_FILE }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
