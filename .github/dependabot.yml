version: 2
updates:

  # Python dependencies (MkDocs and plugins)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "antwanchild"
    labels:
      - "dependencies"
      - "python"
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "antwanchild"
    labels:
      - "dependencies"
      - "github-actions"
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(actions)"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    assignees:
      - "antwanchild"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(docker)"