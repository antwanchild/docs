# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Anthony's Blog
site_url: https://docs.anthonychild.com
site_description: Random Thoughts from Me...
site_author: Anthony Child
copyright: © <script>document.write(new Date().getFullYear())</script> Anthony Child • All rights reserved
# site_dir: /site

theme:
    name: material
    icon:
        logo: fontawesome/brands/discord
    favicon:
        logo: fontawesome/brands/discord
    palette:
    # Palette toggle for automatic mode
        - media: "(prefers-color-scheme)"
          toggle:
            icon: material/brightness-auto
            name: Switch to light mode
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: indigo
          accent: deep orange
          toggle:
            icon: material/brightness-7
            name: Switch to dark mode
        # Palette toggle for dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: deep purple
          accent: amber
          toggle:
            icon: material/brightness-4
            name: Switch to system preference
    features:
        - navigation.tabs
        - navigation.tabs.sticky
        - navigation.sections
        # - navigation.expand
        - navigation.indexes
        - navigation.top
        - navigation.tracking
        - search.suggest
        - search.highlight
        - search.share
        - content.code.copy
        - content.code.annotate
        # - content.action.edit
        # - content.action.view
        - content.tooltips
        - toc.follow
        # - toc.integrate
        - content.tabs.link

markdown_extensions:
    # Python Markdown
    - abbr
    - admonition
    - attr_list
    - def_list
    - footnotes
    - md_in_html
    - tables
    - toc:
        permalink: true
        toc_depth: 3

    # Python Markdown Extentions
    - pymdownx.arithmatex:      #look what this does
        generic: 
    - pymdownx.betterem:        #look what this does
        smart_enable: all
    - pymdownx.caret            #look what this does
    - pymdownx.details
    - pymdownx.emoji:
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.keys
    - pymdownx.mark
    - pymdownx.smartsymbols
    - pymdownx.snippets
    - pymdownx.superfences:
        custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.tabbed:
        alternate_style: true
    - pymdownx.tasklist:
        custom_checkbox: true
    - pymdownx.tilde

plugins:
    - search:
        lang: en
        separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
    - blog:
        blog_dir: .     #blog
        authors_file: ".authors.yml"
        authors_profiles: true
    - macros:
    - tags
        # enabled: true
    # - social
    # - optimize
    # - privacy

