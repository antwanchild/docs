server {
    listen 80;
    server_name wiki.anthonychild.com;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/css application/javascript text/plain text/html application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Serve pre-compressed assets if available
    gzip_static on;

    # Main location
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # JavaScript MIME type
    location ~* \.js$ {
        types {
            application/javascript js;
        }
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets aggressively
    location ~* \.(css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No caching for HTML so updates are picked up immediately
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
